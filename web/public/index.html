<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VR Gorilla-Style Multiplayer Template (WebXR)</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <section id="menu" class="panel">
      <h1>VR Multiplayer Template</h1>
      <p>Join with code or pick a public room.</p>

      <div class="row">
        <input id="privateCode" placeholder="Private code (e.g. A1B2C3)" maxlength="12" />
      </div>

      <div class="row buttons">
        <button id="createPublic">Create Public Server</button>
        <button id="createPrivate">Create Private Server</button>
        <button id="joinPrivate">Join By Code</button>
      </div>

      <h2>Public Servers</h2>
      <div id="publicRooms" class="room-list"></div>

      <p id="status">Connecting...</p>
    </section>

    <section id="inGameHud" class="hud hidden">
      <div id="serverInfo">Not in server</div>
      <div class="hint">Press Y (or keyboard Y) to open leave menu</div>
    </section>

    <section id="leaveMenu" class="panel hidden">
      <h2>Leave Server?</h2>
      <p id="leaveServerInfo"></p>
      <button id="leaveServer">Leave and Return to Menu</button>
      <button id="closeLeaveMenu">Close</button>
    </section>

    <a-scene xr-mode-ui="enabled: true" renderer="colorManagement: true" background="color: #1a1a1a">
      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: directional; intensity: 0.7" position="1 3 2"></a-entity>

      <a-plane rotation="-90 0 0" width="60" height="60" color="#2f5f3a"></a-plane>

      <a-entity id="rig" position="0 1.6 4">
        <a-camera id="head" wasd-controls="acceleration: 22" look-controls></a-camera>
        <a-entity id="leftHand" hand-controls="hand: left"></a-entity>
        <a-entity id="rightHand" hand-controls="hand: right"></a-entity>
      </a-entity>

      <a-entity id="remoteRoot"></a-entity>
    </a-scene>
  </body>
</html>
